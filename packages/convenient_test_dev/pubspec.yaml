name: convenient_test_dev
description: Write and debug tests easily, with full action history, time travel, screenshots, rapid re-execution, video records, interactivity, isolation and more
version: 1.6.2
repository: https://github.com/fzyzcjy/flutter_convenient_test

environment:
  sdk: ">=3.9.0 <4.0.0"
  flutter: ">=3.35.0"

dependencies:
  collection: '>=1.19.0 <1.20.0'
  convenient_test: '>=1.6.0 <1.7.0'
  convenient_test_common: '>=1.6.0 <1.7.0'
  convenient_test_common_dart: '>=1.6.0 <1.7.0'
  fixnum: ^1.1.1
  flutter:
    sdk: flutter
  flutter_test:
    sdk: flutter
  freezed_annotation: ^3.1.0
  get_it: '>=9.0.0 <10.0.0'
  grpc: ^5.1.0
  image: ^4.8.0
  integration_test:
    sdk: flutter
  intl: '>=0.19.0 <0.21.0'
  json_annotation: ^4.11.0
  lint: ">=2.8.0 <3.0.0"
  matcher: ^0.12.19
  meta: ^1.17.0
  path: ^1.9.1
  path_provider: ^2.1.5
  recase: ^4.1.0
  test_api: '>=0.7.10 <0.8.0'
  tuple: ^2.0.2
  web_socket_channel: ^3.0.3

dev_dependencies:
  build_runner: '>=2.10.0 <2.13.0'
  freezed: ^3.2.5
  json_serializable: '>=6.11.0 <7.0.0'

dependency_overrides:
  convenient_test:
    path: ../convenient_test
  convenient_test_common:
    path: ../convenient_test_common
  convenient_test_common_dart:
    path: ../convenient_test_common_dart

